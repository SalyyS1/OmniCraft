main-menu:
  title: "#7cf5ffOmniCraft"
  size: 54
  categories:
    - id: weapons
      title: "Weapons"
      icon: DIAMOND_SWORD
      slot: 10
      permission: "omnicraft.category.weapons"
      conditions: []
      entry-cost: 0.0

craft:
  left-amount: 1
  right-amount: 16
  shift-hard-cap: 512
  cooldown-ms: 350

craft-time:
  enabled: false
  seconds: 5
  cancel-on-move: false
  cancel-on-logout: true
  reopen-menu: true
  title-each-second: true

anti-dupe:
  block-creative: true
  audit: true
  minimum-tps: 16.0
  lock-timeout-ms: 10000
  suspicious-clicks-per-second: 8
  cancel-drag-in-player-gui: true
  cancel-number-key: true
  cancel-double-click: true
  cancel-offhand-swap: true
  cancel-drop-key: true

extraction-defaults:
  enchant: DESTROY
  gemstone: DESTROY
  level: DESTROY
  success-rate: 1.0

advanced-enchantments:
  enabled: true
  apply-output-enchants: true
  count-enchants-as-risk: true
  warn-when-consumed: true
  missing-hook-disables-ae-recipes: false
  extraction:
    extract-rate: 100.0
    fixed-success-rate: 50.0
    fixed-destroy-rate: 0.0
    per-enchant:
      telepathy:
        extract-rate: 100.0
        book-success-rate: 50.0
        book-destroy-rate: 0.0
    tier-rates:
      COMMON: 70.0
      RARE: 55.0
      LEGENDARY: 35.0

history:
  enabled: true
  log-rare-recipes: true
  webhook-url: ""
  file: "logs/craft-history.log"

editor:
  consume-editor-drop: false
  backup-before-save: true
  confirm-delete: true
  atomic-save: true

features:
  favorites: true
  last-category: true
  craftable-filter: true
  missing-material-summary: true
  batch-preview: true
  quick-repeat: true
  locked-recipes-visible: true
